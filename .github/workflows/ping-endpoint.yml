name: Ping Endpoint Every 2 Minutes

on:
  schedule:
    # Runs every 2 minutes
    - cron: "*/2 * * * *"

  # Optional: allow manual trigger
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Call endpoint
        run: |
          curl -X GET "https://police-app-backend-c7x4.onrender.com/api/health"
